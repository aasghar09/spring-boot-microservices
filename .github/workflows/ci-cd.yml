# ============================================================
# FILE LOCATION: .github/workflows/ci-cd.yml
# LAST VERIFIED: Pipeline2 Integration Completes
# PURPOSE: Build → Test → Dockerize → Push to GHCR → Notify
# TRIGGER: Only on Pull Request targeting 'main' branch
# AUTHOR: Generated for aasghar09/spring-boot-microservices
# ============================================================

name: CI/CD Pipeline

# -----------------------------------------------------------------
# TRIGGER CONFIGURATION
# Real-life analogy: Security guard only checks bags at the VIP
# entrance (main) — not at every door in the building
# -----------------------------------------------------------------
on:
  pull_request:
    branches:
      - main

# -----------------------------------------------------------------
# JOBS: Three workstations on an assembly line
#   JOB 1: build-and-test     → Compile + Run Tests
#   JOB 2: docker-build-push  → Build Images + Push to GHCR
#   JOB 3: notify             → Email result (always runs)
# -----------------------------------------------------------------
jobs:

  # ==============================================================
  # JOB 1: BUILD AND TEST
  # Runs on a fresh GitHub Ubuntu server (free)
  # Like a quality inspector — rejects bad parts before packaging
  # ==============================================================
  build-and-test:
    name: 🔨 Build and Test All Services
    runs-on: ubuntu-latest

    steps:

      # ----------------------------------------------------------
      # STEP 1: Download your repo code onto the runner machine
      # The runner starts completely empty — like a blank workshop
      # actions/checkout@v3 is GitHub's official checkout action
      # ----------------------------------------------------------
      - name: Checkout source code
        uses: actions/checkout@v3

      # ----------------------------------------------------------
      # STEP 2: Install Java 8 on the runner
      # distribution: 'temurin' = eclipse-temurin (same as Dockerfile)
      # cache: 'maven' = saves .m2 folder between runs → faster builds
      # ----------------------------------------------------------
      - name: Set up Java 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      # ----------------------------------------------------------
      # STEP 3: Build all 4 JARs from parent root
      # CRITICAL: working-directory is '.' = repo root = parent-project
      # -DskipTests here because tests run separately in Step 4
      # This separation means if BUILD fails, you know it's a
      # compile error — not a test failure
      # ----------------------------------------------------------
      - name: Build all JARs (mvn clean package)
        run: mvn clean package -DskipTests -Dpackaging=jar
        working-directory: .

      # ----------------------------------------------------------
      # STEP 4: Run all unit tests
      # You have no tests yet — this will pass trivially (0 tests)
      # When you add tests in Phase 3, they automatically run here
      # No code change needed in this pipeline file
      # ----------------------------------------------------------
      - name: Run unit tests (mvn test)
        run: mvn test
        working-directory: .

      # ----------------------------------------------------------
      # STEP 5: Save built JARs so Job 2 can use them
      # Why? Each job runs on a SEPARATE fresh machine
      # Without upload-artifact, Job 2 has NO JARs to Dockerize
      # Think of it as a conveyor belt between workstations
      # retention-days: 1 = auto-deleted after 1 day (saves storage)
      # ----------------------------------------------------------
      - name: Upload built JARs as pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: |
            discovery-service/target/*.jar
            config-server/target/*.jar
            gateway-service/target/*.jar
            person-course-service/target/*-exec.war
          retention-days: 7


  # ==============================================================
  # JOB 2: BUILD DOCKER IMAGES AND PUSH TO GHCR
  # needs: build-and-test → only runs if Job 1 PASSES
  # Like the packaging station — only packages quality-passed items
  # ==============================================================
  docker-build-push:
    name: 🐳 Build and Push Docker Images to GHCR
    runs-on: ubuntu-latest
    needs: build-and-test         # CRITICAL: Job 1 must pass first

    # Permissions required by GHCR to accept image pushes
    # Without these, push will return 403 Forbidden
    permissions:
      contents: read
      packages: write

    steps:

      # ----------------------------------------------------------
      # STEP 1: Checkout code again (fresh machine for every job)
      # Needed because Dockerfiles are in your repo
      # ----------------------------------------------------------
      - name: Checkout source code
        uses: actions/checkout@v3

      # ----------------------------------------------------------
      # STEP 2: Download the JARs built in Job 1
      # This is the other end of the conveyor belt from Step 5 above
      # ----------------------------------------------------------
      - name: Download built JARs from Job 1
        uses: actions/download-artifact@v4
        with:
          name: service-jars

      # ----------------------------------------------------------
      # STEP 3: Restore JARs to correct target/ folder locations
      # download-artifact puts all files in the CURRENT directory
      # and flattens the folder structure
      # Dockerfiles expect JARs at: servicename/target/*.jar
      # This step restores that structure manually
      # ----------------------------------------------------------
      - name: Restore JAR folder structure for Dockerfiles
        run: |
          mkdir -p discovery-service/target
          mkdir -p config-server/target
          mkdir -p gateway-service/target
          mkdir -p person-course-service/target
          mv discovery-service*.jar      discovery-service/target/      2>/dev/null || true
          mv config-server*.jar          config-server/target/           2>/dev/null || true
          mv gateway-service*.jar        gateway-service/target/         2>/dev/null || true
          mv person-course-service*.war  person-course-service/target/   2>/dev/null || true

      # ----------------------------------------------------------
      # STEP 4: Log in to GitHub Container Registry (GHCR)
      # Like swiping your access card before the storage room
      # Uses secrets you configured in GitHub → Settings → Secrets
      # registry: ghcr.io = GitHub Container Registry address
      # ----------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ----------------------------------------------------------
      # STEP 5: Generate short commit SHA for image tagging
      # Example output: abc1234
      # Why tag with SHA? Gives every image provenance —
      # you can always trace: which image = which exact code commit
      # Enterprise teams use this for rollbacks and audits
      # ----------------------------------------------------------
      - name: Generate short commit SHA tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------
      # STEP 6: Build and push discovery-service image
      # context: ./discovery-service = folder containing Dockerfile
      # push: true = push to GHCR after building (not just local)
      # Two tags per image:
      #   :latest      → always points to newest version
      #   :abc1234     → pinned to this exact commit (for rollbacks)
      # ----------------------------------------------------------
      - name: Build and push discovery-service
        uses: docker/build-push-action@v4
        with:
          context: ./discovery-service
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/discovery-service:latest
            ghcr.io/${{ secrets.GHCR_USERNAME }}/discovery-service:${{ steps.vars.outputs.sha_short }}

      # ----------------------------------------------------------
      # STEP 7: Build and push config-server image
      # Same pattern as above — repeated for each service
      # ----------------------------------------------------------
      - name: Build and push config-server
        uses: docker/build-push-action@v4
        with:
          context: ./config-server
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/config-server:latest
            ghcr.io/${{ secrets.GHCR_USERNAME }}/config-server:${{ steps.vars.outputs.sha_short }}

      # ----------------------------------------------------------
      # STEP 8: Build and push gateway-service image
      # ----------------------------------------------------------
      - name: Build and push gateway-service
        uses: docker/build-push-action@v4
        with:
          context: ./gateway-service
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/gateway-service:latest
            ghcr.io/${{ secrets.GHCR_USERNAME }}/gateway-service:${{ steps.vars.outputs.sha_short }}

      # ----------------------------------------------------------
      # STEP 9: Build and push person-course-service image
      # ----------------------------------------------------------
      - name: Build and push person-course-service
        uses: docker/build-push-action@v4
        with:
          context: ./person-course-service
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/person-course-service:latest
            ghcr.io/${{ secrets.GHCR_USERNAME }}/person-course-service:${{ steps.vars.outputs.sha_short }}

      # ----------------------------------------------------------
      # STEP 10: Print all pushed image URLs to the run log
      # Useful for copy-pasting image URLs without opening GHCR
      # ----------------------------------------------------------
      - name: Print pushed image URLs
        run: |
          echo "=================================================="
          echo "✅ All images pushed successfully to GHCR!"
          echo "=================================================="
          echo "ghcr.io/${{ secrets.GHCR_USERNAME }}/discovery-service:latest"
          echo "ghcr.io/${{ secrets.GHCR_USERNAME }}/discovery-service:${{ steps.vars.outputs.sha_short }}"
          echo "ghcr.io/${{ secrets.GHCR_USERNAME }}/config-server:latest"
          echo "ghcr.io/${{ secrets.GHCR_USERNAME }}/config-server:${{ steps.vars.outputs.sha_short }}"
          echo "ghcr.io/${{ secrets.GHCR_USERNAME }}/gateway-service:latest"
          echo "ghcr.io/${{ secrets.GHCR_USERNAME }}/gateway-service:${{ steps.vars.outputs.sha_short }}"
          echo "ghcr.io/${{ secrets.GHCR_USERNAME }}/person-course-service:latest"
          echo "ghcr.io/${{ secrets.GHCR_USERNAME }}/person-course-service:${{ steps.vars.outputs.sha_short }}"
          echo "=================================================="


  # ==============================================================
  # JOB 3: EMAIL NOTIFICATION
  # needs: [build-and-test, docker-build-push]
  # if: always() = runs even if previous jobs FAILED
  # Like a report card — issued whether you pass or fail exam
  # This ensures you are ALWAYS notified of the pipeline result
  # ==============================================================
  notify:
    name: 📧 Send Email Notification
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build-push]
    if: always()       # CRITICAL: runs even on failure

    steps:

      # ----------------------------------------------------------
      # STEP 1: Send SUCCESS email
      # Condition: only if BOTH Job 1 and Job 2 passed
      # Uses dawidd6/action-send-mail — most popular email action
      # server: smtp.gmail.com on port 465 (SSL — more reliable than 587)
      # MAIL_USERNAME = your Gmail address
      # MAIL_PASSWORD = Gmail App Password (NOT your Gmail login password)
      # MAIL_TO = recipient email address
      # ----------------------------------------------------------
      - name: Send success email
        if: ${{ needs.build-and-test.result == 'success' && needs.docker-build-push.result == 'success' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ CI/CD Pipeline PASSED — ${{ github.repository }}"
          body: |
            ✅ Pipeline passed successfully!
            ================================================
            Repository  : ${{ github.repository }}
            PR Branch   : ${{ github.head_ref }}
            Target      : ${{ github.base_ref }}
            Triggered by: ${{ github.actor }}
            Commit SHA  : ${{ github.sha }}
            ================================================

            Docker images pushed to GHCR:
            • ghcr.io/${{ secrets.GHCR_USERNAME }}/discovery-service:latest
            • ghcr.io/${{ secrets.GHCR_USERNAME }}/config-server:latest
            • ghcr.io/${{ secrets.GHCR_USERNAME }}/gateway-service:latest
            • ghcr.io/${{ secrets.GHCR_USERNAME }}/person-course-service:latest

            View pipeline run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            ================================================
            This PR is ready to review and merge to main.
          to: ${{ secrets.MAIL_TO }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"

      # ----------------------------------------------------------
      # STEP 2: Send FAILURE email
      # Condition: if EITHER Job 1 OR Job 2 failed
      # Includes direct link to the failed run logs
      # So you can click the link and see exactly what went wrong
      # ----------------------------------------------------------
      - name: Send failure email
        if: ${{ needs.build-and-test.result == 'failure' || needs.docker-build-push.result == 'failure' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ CI/CD Pipeline FAILED — ${{ github.repository }}"
          body: |
            ❌ Pipeline failed! Action required.
            ================================================
            Repository  : ${{ github.repository }}
            PR Branch   : ${{ github.head_ref }}
            Target      : ${{ github.base_ref }}
            Triggered by: ${{ github.actor }}
            Commit SHA  : ${{ github.sha }}
            ================================================

            Job Results:
            • Build & Test  : ${{ needs.build-and-test.result }}
            • Docker Push   : ${{ needs.docker-build-push.result }}

            ▶ View failed run logs (click to investigate):
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            ================================================
            This PR is BLOCKED. Fix the failure before merging.
          to: ${{ secrets.MAIL_TO }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"