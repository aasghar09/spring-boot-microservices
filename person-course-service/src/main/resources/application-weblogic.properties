# ============================================
# WebLogic Profile \u2014 Bypasses Config Server
# ============================================

# Disable Config Server
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Database \u2014 use localhost since WebLogic is outside Docker
spring.datasource.url=jdbc:mysql://localhost:3306/schooldb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Eureka \u2014 disabled for WebLogic standalone deployment
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/school-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/school-realm/protocol/openid-connect/certs

# Zipkin
spring.zipkin.base-url=http://localhost:9411
spring.zipkin.sender.type=web

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always