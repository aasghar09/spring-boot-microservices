spring.application.name=person-course-service
server.port=8082

# ===== DATABASE =====
spring.datasource.url=jdbc:mysql://localhost:3306/schooldb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===== EUREKA =====
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ===== KEYCLOAK JWT =====
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/school-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/school-realm/protocol/openid-connect/certs

# ===== SLEUTH + ZIPKIN =====
spring.sleuth.enabled=true
spring.sleuth.sampler.probability=1.0
spring.zipkin.base-url=http://localhost:9411
spring.zipkin.sender.type=web

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always